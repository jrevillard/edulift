asyncapi: 2.6.0
id: urn:edulift:websocket-api
defaultContentType: application/json
info:
  title: EduLift WebSocket API
  version: 1.0.0
  description: |
    Real-time API for group, family, child, vehicle, and schedule events
    via Socket.IO.

    This API enables clients to receive real-time updates on state changes
    in groups, schedules, and resources (children, vehicles) without the need
    for repeated HTTP polling.

    **Note:** This specification uses AsyncAPI 2.6.0 (instead of 3.1.0) because
    the TypeScript code generator (`@asyncapi/cli generate models typescript`)
    has full support for 2.6.0 but generates only 1 type with 3.1.0.
    Version 2.6.0 is stable, mature, and all tooling works correctly.
  contact:
    name: EduLift Backend Team
    url: https://github.com/edulift
    email: backend@edulift.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: websocket
    description: WebSocket API for real-time events
  - name: realtime
    description: Real-time event notifications
  - name: edulift
    description: EduLift school transportation management
servers:
  production:
    url: wss://api.edulift.com
    protocol: socket.io
    description: Production server
    variables:
      transport:
        description: Transport protocol
        enum:
          - websocket
          - polling
        default: websocket
  development:
    url: ws://localhost:3000
    protocol: socket.io
    description: Development server
    variables:
      transport:
        description: Transport protocol
        enum:
          - websocket
          - polling
        default: websocket
channels:
  connected:
    publish:
      operationId: onConnected
      message:
        $ref: "#/components/messages/Connected"
      description: Emitted when connection is established with successful authentication
  disconnected:
    publish:
      message:
        $ref: "#/components/messages/Disconnected"
      description: Emitted when client disconnects
      operationId: publish_disconnected
  group:created:
    publish:
      operationId: onGroupCreated
      message:
        $ref: "#/components/messages/GroupCreated"
      description: Emitted when a new group is created
      x-room: Creator and invited families receive this event
  group:deleted:
    publish:
      message:
        $ref: "#/components/messages/GroupDeleted"
      description: Emitted when a group is deleted
      x-room: All group members receive this event
      operationId: publish_group_deleted
  group:updated:
    publish:
      message:
        $ref: "#/components/messages/GroupUpdated"
      description: Emitted when a group is modified (name, description, etc.)
      x-room: All group members receive this event
      operationId: publish_group_updated
  group:family:added:
    publish:
      message:
        $ref: "#/components/messages/GroupFamilyAdded"
      description: Emitted when a family joins a group
      x-room: All group members receive this event
      operationId: publish_group_family_added
  group:family:left:
    publish:
      message:
        $ref: "#/components/messages/GroupFamilyLeft"
      description: Emitted when a family voluntarily leaves a group
      x-room: All group members receive this event
      operationId: publish_group_family_left
  group:family:removed:
    publish:
      message:
        $ref: "#/components/messages/GroupFamilyRemoved"
      description: Emitted when a family is removed from a group by an admin
      x-room: All group members receive this event
      operationId: publish_group_family_removed
  group:family:role:updated:
    publish:
      message:
        $ref: "#/components/messages/GroupFamilyRoleUpdated"
      description: Emitted when a family's role is changed in a group
      x-room: All group members receive this event
      operationId: publish_group_family_role_updated
  group:invitation:sent:
    publish:
      message:
        $ref: "#/components/messages/GroupInvitationSent"
      description: Emitted when an invitation to join a group is sent
      x-room: Group admins and invited family receive this event
      operationId: publish_group_invitation_sent
  member:joined:
    publish:
      message:
        $ref: "#/components/messages/MemberJoined"
      description: Emitted when a member joins a group
      x-room: All group members receive this event
      operationId: publish_member_joined
  member:left:
    publish:
      message:
        $ref: "#/components/messages/MemberLeft"
      description: Emitted when a member leaves a group
      x-room: All group members receive this event
      operationId: publish_member_left
  group:join:
    subscribe:
      message:
        $ref: "#/components/messages/GroupJoin"
      description: Client requests to join a group's room to receive its events
      operationId: subscribe_group_join
  group:leave:
    subscribe:
      message:
        $ref: "#/components/messages/GroupLeave"
      description: Client requests to leave a group's room
      operationId: subscribe_group_leave
  schedule:updated:
    publish:
      message:
        $ref: "#/components/messages/ScheduleUpdated"
      description: Emitted when a schedule is updated (publication, modifications)
      x-room: All group members receive this event
      operationId: publish_schedule_updated
  schedule:slot:created:
    publish:
      message:
        $ref: "#/components/messages/ScheduleSlotCreated"
      description: Emitted when a new schedule slot is created
      x-room: All group members receive this event
      operationId: publish_schedule_slot_created
  schedule:slot:updated:
    publish:
      operationId: onScheduleSlotUpdated
      message:
        $ref: "#/components/messages/ScheduleSlotUpdated"
      description: Emitted when a schedule slot is modified (assignment, capacity)
      x-room: All group members and slot subscribers receive this event
  schedule:slot:deleted:
    publish:
      message:
        $ref: "#/components/messages/ScheduleSlotDeleted"
      description: Emitted when a schedule slot is deleted
      x-room: All group members receive this event
      operationId: publish_schedule_slot_deleted
  scheduleSlot:capacity:full:
    publish:
      message:
        $ref: "#/components/messages/ScheduleSlotCapacityFull"
      description: Emitted when a slot reaches maximum capacity
      x-room: All group members receive this event
      operationId: publish_scheduleSlot_capacity_full
  scheduleSlot:capacity:warning:
    publish:
      message:
        $ref: "#/components/messages/ScheduleSlotCapacityWarning"
      description: Emitted when a slot approaches maximum capacity (alert)
      x-room: All group members receive this event
      operationId: publish_scheduleSlot_capacity_warning
  schedule:subscribe:
    subscribe:
      message:
        $ref: "#/components/messages/ScheduleSubscribe"
      description: Client subscribes to a group's schedule events for a week
      operationId: subscribe_schedule_subscribe
  schedule:unsubscribe:
    subscribe:
      message:
        $ref: "#/components/messages/ScheduleUnsubscribe"
      description: Client unsubscribes from a group's schedule events
      operationId: subscribe_schedule_unsubscribe
  scheduleSlot:join:
    subscribe:
      message:
        $ref: "#/components/messages/ScheduleSlotJoin"
      description: Client joins a specific schedule slot
      operationId: subscribe_scheduleSlot_join
  scheduleSlot:leave:
    subscribe:
      message:
        $ref: "#/components/messages/ScheduleSlotLeave"
      description: Client leaves a specific schedule slot
      operationId: subscribe_scheduleSlot_leave
  child:added:
    publish:
      message:
        $ref: "#/components/messages/ChildAdded"
      description: Emitted when a child is added to a family
      x-room: All family members receive this event
      operationId: publish_child_added
  child:updated:
    publish:
      message:
        $ref: "#/components/messages/ChildUpdated"
      description: Emitted when a child is modified (information, permissions)
      x-room: All family members receive this event
      operationId: publish_child_updated
  child:deleted:
    publish:
      message:
        $ref: "#/components/messages/ChildDeleted"
      description: Emitted when a child is deleted from a family
      x-room: All family members receive this event
      operationId: publish_child_deleted
  vehicle:added:
    publish:
      message:
        $ref: "#/components/messages/VehicleAdded"
      description: Emitted when a vehicle is added to a family
      x-room: All family members receive this event
      operationId: publish_vehicle_added
  vehicle:updated:
    publish:
      message:
        $ref: "#/components/messages/VehicleUpdated"
      description: Emitted when a vehicle is modified (characteristics, availability)
      x-room: All family members receive this event
      operationId: publish_vehicle_updated
  vehicle:deleted:
    publish:
      message:
        $ref: "#/components/messages/VehicleDeleted"
      description: Emitted when a vehicle is deleted from a family
      x-room: All family members receive this event
      operationId: publish_vehicle_deleted
  family:member:joined:
    publish:
      message:
        $ref: "#/components/messages/FamilyMemberJoined"
      description: Emitted when a member joins a family
      x-room: All family members receive this event
      operationId: publish_family_member_joined
  family:member:left:
    publish:
      message:
        $ref: "#/components/messages/FamilyMemberLeft"
      description: Emitted when a member leaves a family
      x-room: All family members receive this event
      operationId: publish_family_member_left
  family:updated:
    publish:
      message:
        $ref: "#/components/messages/FamilyUpdated"
      description: Emitted when a family is modified (name, settings)
      x-room: All family members receive this event
      operationId: publish_family_updated
  user:joined:
    publish:
      message:
        $ref: "#/components/messages/UserJoined"
      description: Emitted when a user connects and joins a group
      x-room: All group members receive this event
      operationId: publish_user_joined
  user:left:
    publish:
      message:
        $ref: "#/components/messages/UserLeft"
      description: Emitted when a user disconnects or leaves a group
      x-room: All group members receive this event
      operationId: publish_user_left
  user:typing:
    publish:
      message:
        $ref: "#/components/messages/UserTyping"
      description: Emitted when a user starts typing in a schedule slot
      x-room: Users subscribed to this slot receive this event
      operationId: publish_user_typing
  user:stopped_typing:
    publish:
      message:
        $ref: "#/components/messages/UserStoppedTyping"
      description: Emitted when a user stops typing
      x-room: Users subscribed to this slot receive this event
      operationId: publish_user_stopped_typing
  notification:
    publish:
      message:
        $ref: "#/components/messages/Notification"
      description: General system notification
      x-room: Sent to concerned users
      operationId: publish_notification
  conflict:detected:
    publish:
      message:
        $ref: "#/components/messages/ConflictDetected"
      description: Emitted when a conflict is detected (double booking, capacity exceeded)
      x-room: Sent to users affected by the conflict
      operationId: publish_conflict_detected
  error:
    publish:
      operationId: onError
      message:
        $ref: "#/components/messages/Error"
      description: Server error or validation error
      x-room: Sent to concerned client
  heartbeat:
    subscribe:
      message:
        $ref: "#/components/messages/Heartbeat"
      description: Client sends a ping to maintain connection
      operationId: subscribe_heartbeat
  heartbeat-ack:
    publish:
      message:
        $ref: "#/components/messages/HeartbeatAck"
      description: Server responds to client ping
      operationId: publish_heartbeat-ack
components:
  messages:
    Connected:
      name: Connected
      messageId: connectedEvent
      title: Connection Established
      summary: Emitted when connection is established with successful authentication
      payload:
        $ref: "#/components/schemas/ConnectedPayload"
    Disconnected:
      name: Disconnected
      title: Disconnection
      summary: Emitted when client disconnects
      payload:
        $ref: "#/components/schemas/DisconnectedPayload"
      messageId: disconnectedEvent
    GroupCreated:
      name: GroupCreated
      messageId: groupCreatedEvent
      title: Group Created
      summary: A new group has been created
      payload:
        $ref: "#/components/schemas/GroupEventDataCreated"
    GroupDeleted:
      name: GroupDeleted
      title: Group Deleted
      summary: A group has been deleted
      payload:
        $ref: "#/components/schemas/GroupEventDataDeleted"
      messageId: groupDeletedEvent
    GroupUpdated:
      name: GroupUpdated
      title: Group Updated
      summary: Group information has been modified
      payload:
        $ref: "#/components/schemas/GroupEventDataUpdated"
      messageId: groupUpdatedEvent
    GroupFamilyAdded:
      name: GroupFamilyAdded
      title: Family Added to Group
      summary: A family has joined a group
      payload:
        $ref: "#/components/schemas/GroupFamilyEventDataAdded"
      messageId: groupFamilyAddedEvent
    GroupFamilyLeft:
      name: GroupFamilyLeft
      title: Family Left Group
      summary: A family has voluntarily left a group
      payload:
        $ref: "#/components/schemas/GroupFamilyLeftEventData"
      messageId: groupFamilyLeftEvent
    GroupFamilyRemoved:
      name: GroupFamilyRemoved
      title: Family Removed from Group
      summary: A family has been removed from a group by an admin
      payload:
        $ref: "#/components/schemas/GroupFamilyRemovedEventData"
      messageId: groupFamilyRemovedEvent
    GroupFamilyRoleUpdated:
      name: GroupFamilyRoleUpdated
      title: Family Role Updated
      summary: A family's role has been changed in a group
      payload:
        $ref: "#/components/schemas/GroupFamilyRoleEventData"
      messageId: groupFamilyRoleUpdatedEvent
    GroupInvitationSent:
      name: GroupInvitationSent
      title: Invitation Sent
      summary: An invitation to join a group has been sent
      payload:
        $ref: "#/components/schemas/GroupInvitationEventData"
      messageId: groupInvitationSentEvent
    MemberJoined:
      name: MemberJoined
      title: Member Joined
      summary: A member has joined a group
      payload:
        $ref: "#/components/schemas/MemberJoinedEventData"
      messageId: memberJoinedEvent
    MemberLeft:
      name: MemberLeft
      title: Member Left
      summary: A member has left a group
      payload:
        $ref: "#/components/schemas/MemberLeftEventData"
      messageId: memberLeftEvent
    GroupJoin:
      name: GroupJoin
      title: Join Group
      summary: Client requests to join a group's room
      payload:
        $ref: "#/components/schemas/GroupJoinRequestData"
      messageId: groupJoin
    GroupLeave:
      name: GroupLeave
      title: Leave Group
      summary: Client requests to leave a group's room
      payload:
        $ref: "#/components/schemas/GroupLeaveRequestData"
      messageId: groupLeave
    ScheduleUpdated:
      name: ScheduleUpdated
      title: Schedule Updated
      summary: A schedule has been updated
      payload:
        $ref: "#/components/schemas/ScheduleEventData"
      messageId: scheduleUpdatedEvent
    ScheduleSlotCreated:
      name: ScheduleSlotCreated
      title: Slot Created
      summary: A new schedule slot has been created
      payload:
        $ref: "#/components/schemas/ScheduleSlotEventDataCreated"
      messageId: scheduleSlotCreatedEvent
    ScheduleSlotUpdated:
      name: ScheduleSlotUpdated
      messageId: scheduleSlotUpdatedEvent
      title: Slot Updated
      summary: A schedule slot has been modified
      payload:
        $ref: "#/components/schemas/ScheduleSlotEventDataUpdated"
    ScheduleSlotDeleted:
      name: ScheduleSlotDeleted
      title: Slot Deleted
      summary: A schedule slot has been deleted
      payload:
        $ref: "#/components/schemas/ScheduleSlotEventDataDeleted"
      messageId: scheduleSlotDeletedEvent
    ScheduleSlotCapacityFull:
      name: ScheduleSlotCapacityFull
      title: Maximum Capacity Reached
      summary: A slot has reached its maximum capacity
      payload:
        $ref: "#/components/schemas/ScheduleSlotCapacityFullEventData"
      messageId: scheduleSlotCapacityFullEvent
    ScheduleSlotCapacityWarning:
      name: ScheduleSlotCapacityWarning
      title: Capacity Alert
      summary: A slot is approaching its maximum capacity
      payload:
        $ref: "#/components/schemas/ScheduleSlotCapacityWarningEventData"
      messageId: scheduleSlotCapacityWarningEvent
    ScheduleSubscribe:
      name: ScheduleSubscribe
      title: Subscribe to Schedule
      summary: Client subscribes to schedule events
      payload:
        $ref: "#/components/schemas/ScheduleSubscribeRequestData"
      messageId: scheduleSubscribe
    ScheduleUnsubscribe:
      name: ScheduleUnsubscribe
      title: Unsubscribe from Schedule
      summary: Client unsubscribes from schedule events
      payload:
        $ref: "#/components/schemas/ScheduleUnsubscribeRequestData"
      messageId: scheduleUnsubscribe
    ScheduleSlotJoin:
      name: ScheduleSlotJoin
      title: Join Slot
      summary: Client joins a schedule slot
      payload:
        $ref: "#/components/schemas/ScheduleSlotJoinRequestData"
      messageId: scheduleSlotJoin
    ScheduleSlotLeave:
      name: ScheduleSlotLeave
      title: Leave Slot
      summary: Client leaves a schedule slot
      payload:
        $ref: "#/components/schemas/ScheduleSlotLeaveRequestData"
      messageId: scheduleSlotLeave
    ChildAdded:
      name: ChildAdded
      title: Child Added
      summary: A child has been added to a family
      payload:
        $ref: "#/components/schemas/ChildEventDataAdded"
      messageId: childAddedEvent
    ChildUpdated:
      name: ChildUpdated
      title: Child Updated
      summary: Child information has been modified
      payload:
        $ref: "#/components/schemas/ChildEventDataUpdated"
      messageId: childUpdatedEvent
    ChildDeleted:
      name: ChildDeleted
      title: Child Deleted
      summary: A child has been deleted from a family
      payload:
        $ref: "#/components/schemas/ChildEventDataDeleted"
      messageId: childDeletedEvent
    VehicleAdded:
      name: VehicleAdded
      title: Vehicle Added
      summary: A vehicle has been added to a family
      payload:
        $ref: "#/components/schemas/VehicleEventDataAdded"
      messageId: vehicleAddedEvent
    VehicleUpdated:
      name: VehicleUpdated
      title: Vehicle Updated
      summary: Vehicle information has been modified
      payload:
        $ref: "#/components/schemas/VehicleEventDataUpdated"
      messageId: vehicleUpdatedEvent
    VehicleDeleted:
      name: VehicleDeleted
      title: Vehicle Deleted
      summary: A vehicle has been deleted from a family
      payload:
        $ref: "#/components/schemas/VehicleEventDataDeleted"
      messageId: vehicleDeletedEvent
    FamilyMemberJoined:
      name: FamilyMemberJoined
      title: Member Joined Family
      summary: A member has joined a family
      payload:
        $ref: "#/components/schemas/FamilyMemberJoinedEventData"
      messageId: familyMemberJoinedEvent
    FamilyMemberLeft:
      name: FamilyMemberLeft
      title: Member Left Family
      summary: A member has left a family
      payload:
        $ref: "#/components/schemas/FamilyMemberLeftEventData"
      messageId: familyMemberLeftEvent
    FamilyUpdated:
      name: FamilyUpdated
      title: Family Updated
      summary: Family information has been modified
      payload:
        $ref: "#/components/schemas/FamilyEventData"
      messageId: familyUpdatedEvent
    UserJoined:
      name: UserJoined
      title: User Connected
      summary: A user has connected and joined a group
      payload:
        $ref: "#/components/schemas/UserJoinedEventData"
      messageId: userJoinedEvent
    UserLeft:
      name: UserLeft
      title: User Disconnected
      summary: A user has disconnected or left a group
      payload:
        $ref: "#/components/schemas/UserLeftEventData"
      messageId: userLeftEvent
    UserTyping:
      name: UserTyping
      title: User Typing
      summary: A user starts typing
      payload:
        $ref: "#/components/schemas/TypingEventDataTyping"
      messageId: userTypingEvent
    UserStoppedTyping:
      name: UserStoppedTyping
      title: User Stopped Typing
      summary: A user stops typing
      payload:
        $ref: "#/components/schemas/TypingEventDataStoppedTyping"
      messageId: userStoppedTypingEvent
    Notification:
      name: Notification
      title: Notification
      summary: System notification
      payload:
        $ref: "#/components/schemas/NotificationEventData"
      messageId: notificationEvent
    ConflictDetected:
      name: ConflictDetected
      title: Conflict Detected
      summary: A conflict has been detected
      payload:
        $ref: "#/components/schemas/ConflictEventData"
      messageId: conflictDetectedEvent
    Error:
      name: Error
      messageId: errorEvent
      title: Error
      summary: Server or validation error
      payload:
        $ref: "#/components/schemas/ErrorEventData"
    Heartbeat:
      name: Heartbeat
      title: Ping
      summary: Client sends a keep-alive ping
      payload:
        $ref: "#/components/schemas/HeartbeatPayload"
      messageId: heartbeat
    HeartbeatAck:
      name: HeartbeatAck
      title: Pong
      summary: Server responds to client ping
      payload:
        $ref: "#/components/schemas/HeartbeatAckData"
      messageId: heartbeatAck
  schemas:
    ConnectedPayload:
      type: object
      description: Payload sent on successful connection
      required:
        - userId
        - timestamp
      properties:
        userId:
          type: string
          description: ID of connected user
        groups:
          type: array
          items:
            type: string
          description: List of user's group IDs
        timestamp:
          type: integer
          description: UNIX timestamp of connection
    GroupFamilyRoleEventData:
      type: object
      required:
        - groupId
        - familyId
        - newRole
      properties:
        groupId:
          type: string
          description: Group ID
        familyId:
          type: string
          description: Family ID
        newRole:
          $ref: "#/components/schemas/FamilyRole"
        previousRole:
          $ref: "#/components/schemas/FamilyRole"
        updatedBy:
          type: string
          description: ID of user who changed the role
    GroupInvitationEventData:
      type: object
      required:
        - groupId
        - familyId
      properties:
        groupId:
          type: string
          description: Group ID
        familyId:
          type: string
          description: Invited family ID
        inviteCode:
          type: string
          description: Invitation code
        invitedBy:
          type: string
          description: ID of user who sent the invitation
        expiresAt:
          type: integer
          description: Invitation expiration timestamp
    GroupJoinRequestData:
      type: object
      required:
        - groupId
      properties:
        groupId:
          type: string
          description: Group ID to join
    GroupLeaveRequestData:
      type: object
      required:
        - groupId
      properties:
        groupId:
          type: string
          description: Group ID to leave
    ScheduleEventData:
      type: object
      required:
        - groupId
        - week
      properties:
        groupId:
          type: string
          description: Group ID
        week:
          type: string
          pattern: ^\d{4}-\d{1,2}$
          description: Week in format YYYY-W or YYYY-WW
        schedule:
          $ref: "#/components/schemas/ScheduleData"
    ScheduleSlotCapacityFullEventData:
      type: object
      required:
        - groupId
        - scheduleSlotId
        - status
      properties:
        groupId:
          type: string
          description: Group ID
        scheduleSlotId:
          type: string
          description: Schedule slot ID
        status:
          $ref: "#/components/schemas/CapacityStatusFull"
        currentLoad:
          type: integer
          description: Current slot load
        capacity:
          type: integer
          description: Maximum slot capacity
        message:
          type: string
          description: Descriptive message (optional)
    ScheduleSlotCapacityWarningEventData:
      type: object
      required:
        - groupId
        - scheduleSlotId
        - status
      properties:
        groupId:
          type: string
          description: Group ID
        scheduleSlotId:
          type: string
          description: Schedule slot ID
        status:
          $ref: "#/components/schemas/CapacityStatusWarning"
        currentLoad:
          type: integer
          description: Current slot load
        capacity:
          type: integer
          description: Maximum slot capacity
        message:
          type: string
          description: Descriptive message (optional)
    ScheduleSubscribeRequestData:
      type: object
      required:
        - groupId
        - week
      properties:
        groupId:
          type: string
          description: Group ID
        week:
          type: string
          pattern: ^\d{4}-\d{1,2}$
          description: Week in format YYYY-W or YYYY-WW
    ScheduleUnsubscribeRequestData:
      type: object
      required:
        - groupId
        - week
      properties:
        groupId:
          type: string
          description: Group ID
        week:
          type: string
          pattern: ^\d{4}-\d{1,2}$
          description: Week in format YYYY-W or YYYY-WW
    ScheduleSlotJoinRequestData:
      type: object
      required:
        - scheduleSlotId
      properties:
        scheduleSlotId:
          type: string
          description: Schedule slot ID
    ScheduleSlotLeaveRequestData:
      type: object
      required:
        - scheduleSlotId
      properties:
        scheduleSlotId:
          type: string
          description: Schedule slot ID
    FamilyMemberJoinedEventData:
      type: object
      required:
        - familyId
        - userId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        userId:
          type: string
          description: Member ID
        action:
          $ref: "#/components/schemas/MemberActionJoined"
        userName:
          type: string
          description: User name (optional)
        role:
          type: string
          description: Role in family (optional)
    FamilyMemberLeftEventData:
      type: object
      required:
        - familyId
        - userId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        userId:
          type: string
          description: Member ID
        action:
          $ref: "#/components/schemas/MemberActionLeft"
        userName:
          type: string
          description: User name (optional)
        role:
          type: string
          description: Role in family (optional)
    FamilyEventData:
      type: object
      required:
        - familyId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        action:
          $ref: "#/components/schemas/FamilyUpdateAction"
        family:
          $ref: "#/components/schemas/FamilyData"
    NotificationEventData:
      type: object
      required:
        - type
        - message
      properties:
        type:
          $ref: "#/components/schemas/NotificationType"
        message:
          type: string
          description: Notification message
        data:
          $ref: "#/components/schemas/NotificationData"
    ConflictEventData:
      type: object
      required:
        - scheduleSlotId
        - conflictType
        - affectedUsers
      properties:
        scheduleSlotId:
          type: string
          description: Conflicting schedule slot ID
        conflictType:
          $ref: "#/components/schemas/ConflictType"
        affectedUsers:
          type: array
          items:
            type: string
          description: List of affected user IDs
        message:
          type: string
          description: Descriptive conflict message
    ErrorEventData:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
