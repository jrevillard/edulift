asyncapi: '2.6.0'
id: 'urn:edulift:websocket-api'
defaultContentType: 'application/json'
info:
  title: EduLift WebSocket API
  version: 1.0.0
  description: |
    Real-time API for group, family, child, vehicle, and schedule events
    via Socket.IO.

    This API enables clients to receive real-time updates on state changes
    in groups, schedules, and resources (children, vehicles) without the need
    for repeated HTTP polling.
  contact:
    name: EduLift Backend Team
    url: https://github.com/edulift
    email: backend@edulift.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: websocket
    description: WebSocket API for real-time events
  - name: realtime
    description: Real-time event notifications
  - name: edulift
    description: EduLift school transportation management

servers:
  production:
    url: wss://api.edulift.com
    protocol: socket.io
    description: Production server
    variables:
      transport:
        description: Transport protocol
        enum: [websocket, polling]
        default: websocket

  development:
    url: ws://localhost:3000
    protocol: socket.io
    description: Development server
    variables:
      transport:
        description: Transport protocol
        enum: [websocket, polling]
        default: websocket

channels:
  # Connection Events
  connected:
    publish:
      operationId: onConnected
      message:
        $ref: '#/components/messages/Connected'
      description: Emitted when connection is established with successful authentication

  disconnected:
    publish:
      message:
        $ref: '#/components/messages/Disconnected'
      description: Emitted when client disconnects

  # Group Management Events
  group:created:
    publish:
      operationId: onGroupCreated
      message:
        $ref: '#/components/messages/GroupCreated'
      description: Emitted when a new group is created
      x-room: Creator and invited families receive this event

  group:deleted:
    publish:
      message:
        $ref: '#/components/messages/GroupDeleted'
      description: Emitted when a group is deleted
      x-room: All group members receive this event

  group:updated:
    publish:
      message:
        $ref: '#/components/messages/GroupUpdated'
      description: Emitted when a group is modified (name, description, etc.)
      x-room: All group members receive this event

  group:family:added:
    publish:
      message:
        $ref: '#/components/messages/GroupFamilyAdded'
      description: Emitted when a family joins a group
      x-room: All group members receive this event

  group:family:left:
    publish:
      message:
        $ref: '#/components/messages/GroupFamilyLeft'
      description: Emitted when a family voluntarily leaves a group
      x-room: All group members receive this event

  group:family:removed:
    publish:
      message:
        $ref: '#/components/messages/GroupFamilyRemoved'
      description: Emitted when a family is removed from a group by an admin
      x-room: All group members receive this event

  group:family:role:updated:
    publish:
      message:
        $ref: '#/components/messages/GroupFamilyRoleUpdated'
      description: Emitted when a family's role is changed in a group
      x-room: All group members receive this event

  group:invitation:sent:
    publish:
      message:
        $ref: '#/components/messages/GroupInvitationSent'
      description: Emitted when an invitation to join a group is sent
      x-room: Group admins and invited family receive this event

  member:joined:
    publish:
      message:
        $ref: '#/components/messages/MemberJoined'
      description: Emitted when a member joins a group
      x-room: All group members receive this event

  member:left:
    publish:
      message:
        $ref: '#/components/messages/MemberLeft'
      description: Emitted when a member leaves a group
      x-room: All group members receive this event

  # Group Subscription (Client -> Server)
  group:join:
    subscribe:
      message:
        $ref: '#/components/messages/GroupJoin'
      description: Client requests to join a group's room to receive its events

  group:leave:
    subscribe:
      message:
        $ref: '#/components/messages/GroupLeave'
      description: Client requests to leave a group's room

  # Schedule Management Events
  schedule:updated:
    publish:
      message:
        $ref: '#/components/messages/ScheduleUpdated'
      description: Emitted when a schedule is updated (publication, modifications)
      x-room: All group members receive this event

  schedule:slot:created:
    publish:
      message:
        $ref: '#/components/messages/ScheduleSlotCreated'
      description: Emitted when a new schedule slot is created
      x-room: All group members receive this event

  schedule:slot:updated:
    publish:
      operationId: onScheduleSlotUpdated
      message:
        $ref: '#/components/messages/ScheduleSlotUpdated'
      description: Emitted when a schedule slot is modified (assignment, capacity)
      x-room: All group members and slot subscribers receive this event

  schedule:slot:deleted:
    publish:
      message:
        $ref: '#/components/messages/ScheduleSlotDeleted'
      description: Emitted when a schedule slot is deleted
      x-room: All group members receive this event

  # Schedule Capacity Events
  scheduleSlot:capacity:full:
    publish:
      message:
        $ref: '#/components/messages/ScheduleSlotCapacityFull'
      description: Emitted when a slot reaches maximum capacity
      x-room: All group members receive this event

  scheduleSlot:capacity:warning:
    publish:
      message:
        $ref: '#/components/messages/ScheduleSlotCapacityWarning'
      description: Emitted when a slot approaches maximum capacity (alert)
      x-room: All group members receive this event

  # Schedule Subscription (Client -> Server)
  schedule:subscribe:
    subscribe:
      message:
        $ref: '#/components/messages/ScheduleSubscribe'
      description: Client subscribes to a group's schedule events for a week

  schedule:unsubscribe:
    subscribe:
      message:
        $ref: '#/components/messages/ScheduleUnsubscribe'
      description: Client unsubscribes from a group's schedule events

  scheduleSlot:join:
    subscribe:
      message:
        $ref: '#/components/messages/ScheduleSlotJoin'
      description: Client joins a specific schedule slot

  scheduleSlot:leave:
    subscribe:
      message:
        $ref: '#/components/messages/ScheduleSlotLeave'
      description: Client leaves a specific schedule slot

  # Child Management Events
  child:added:
    publish:
      message:
        $ref: '#/components/messages/ChildAdded'
      description: Emitted when a child is added to a family
      x-room: All family members receive this event

  child:updated:
    publish:
      message:
        $ref: '#/components/messages/ChildUpdated'
      description: Emitted when a child is modified (information, permissions)
      x-room: All family members receive this event

  child:deleted:
    publish:
      message:
        $ref: '#/components/messages/ChildDeleted'
      description: Emitted when a child is deleted from a family
      x-room: All family members receive this event

  # Vehicle Management Events
  vehicle:added:
    publish:
      message:
        $ref: '#/components/messages/VehicleAdded'
      description: Emitted when a vehicle is added to a family
      x-room: All family members receive this event

  vehicle:updated:
    publish:
      message:
        $ref: '#/components/messages/VehicleUpdated'
      description: Emitted when a vehicle is modified (characteristics, availability)
      x-room: All family members receive this event

  vehicle:deleted:
    publish:
      message:
        $ref: '#/components/messages/VehicleDeleted'
      description: Emitted when a vehicle is deleted from a family
      x-room: All family members receive this event

  # Family Management Events
  family:member:joined:
    publish:
      message:
        $ref: '#/components/messages/FamilyMemberJoined'
      description: Emitted when a member joins a family
      x-room: All family members receive this event

  family:member:left:
    publish:
      message:
        $ref: '#/components/messages/FamilyMemberLeft'
      description: Emitted when a member leaves a family
      x-room: All family members receive this event

  family:updated:
    publish:
      message:
        $ref: '#/components/messages/FamilyUpdated'
      description: Emitted when a family is modified (name, settings)
      x-room: All family members receive this event

  # User Presence Events
  user:joined:
    publish:
      message:
        $ref: '#/components/messages/UserJoined'
      description: Emitted when a user connects and joins a group
      x-room: All group members receive this event

  user:left:
    publish:
      message:
        $ref: '#/components/messages/UserLeft'
      description: Emitted when a user disconnects or leaves a group
      x-room: All group members receive this event

  user:typing:
    publish:
      message:
        $ref: '#/components/messages/UserTyping'
      description: Emitted when a user starts typing in a schedule slot
      x-room: Users subscribed to this slot receive this event

  user:stopped_typing:
    publish:
      message:
        $ref: '#/components/messages/UserStoppedTyping'
      description: Emitted when a user stops typing
      x-room: Users subscribed to this slot receive this event

  # System Events
  notification:
    publish:
      message:
        $ref: '#/components/messages/Notification'
      description: General system notification
      x-room: Sent to concerned users

  conflict:detected:
    publish:
      message:
        $ref: '#/components/messages/ConflictDetected'
      description: Emitted when a conflict is detected (double booking, capacity exceeded)
      x-room: Sent to users affected by the conflict

  error:
    publish:
      operationId: onError
      message:
        $ref: '#/components/messages/Error'
      description: Server error or validation error
      x-room: Sent to concerned client

  heartbeat:
    subscribe:
      message:
        $ref: '#/components/messages/Heartbeat'
      description: Client sends a ping to maintain connection

  heartbeat-ack:
    publish:
      message:
        $ref: '#/components/messages/HeartbeatAck'
      description: Server responds to client ping

components:
  messages:
    # Connection Messages
    Connected:
      name: Connected
      messageId: connectedEvent
      title: Connection Established
      summary: Emitted when connection is established with successful authentication
      payload:
        $ref: '#/components/schemas/ConnectedPayload'

    Disconnected:
      name: Disconnected
      title: Disconnection
      summary: Emitted when client disconnects
      payload:
        type: object
        properties:
          reason:
            type: string
            enum: [client_disconnect, server_disconnect, timeout, auth_failed]
            description: Reason for disconnection
          timestamp:
            type: integer
            description: UNIX timestamp of disconnection

    # Group Messages
    GroupCreated:
      name: GroupCreated
      messageId: groupCreatedEvent
      title: Group Created
      summary: A new group has been created
      payload:
        $ref: '#/components/schemas/GroupEventData'

    GroupDeleted:
      name: GroupDeleted
      title: Group Deleted
      summary: A group has been deleted
      payload:
        $ref: '#/components/schemas/GroupEventData'

    GroupUpdated:
      name: GroupUpdated
      title: Group Updated
      summary: Group information has been modified
      payload:
        $ref: '#/components/schemas/GroupEventData'

    GroupFamilyAdded:
      name: GroupFamilyAdded
      title: Family Added to Group
      summary: A family has joined a group
      payload:
        $ref: '#/components/schemas/GroupFamilyEventData'

    GroupFamilyLeft:
      name: GroupFamilyLeft
      title: Family Left Group
      summary: A family has voluntarily left a group
      payload:
        $ref: '#/components/schemas/GroupFamilyEventData'

    GroupFamilyRemoved:
      name: GroupFamilyRemoved
      title: Family Removed from Group
      summary: A family has been removed from a group by an admin
      payload:
        $ref: '#/components/schemas/GroupFamilyEventData'

    GroupFamilyRoleUpdated:
      name: GroupFamilyRoleUpdated
      title: Family Role Updated
      summary: A family's role has been changed in a group
      payload:
        $ref: '#/components/schemas/GroupFamilyRoleEventData'

    GroupInvitationSent:
      name: GroupInvitationSent
      title: Invitation Sent
      summary: An invitation to join a group has been sent
      payload:
        $ref: '#/components/schemas/GroupInvitationEventData'

    MemberJoined:
      name: MemberJoined
      title: Member Joined
      summary: A member has joined a group
      payload:
        $ref: '#/components/schemas/MemberEventData'

    MemberLeft:
      name: MemberLeft
      title: Member Left
      summary: A member has left a group
      payload:
        $ref: '#/components/schemas/MemberEventData'

    GroupJoin:
      name: GroupJoin
      title: Join Group
      summary: Client requests to join a group's room
      payload:
        $ref: '#/components/schemas/GroupJoinData'

    GroupLeave:
      name: GroupLeave
      title: Leave Group
      summary: Client requests to leave a group's room
      payload:
        $ref: '#/components/schemas/GroupJoinData'

    # Schedule Messages
    ScheduleUpdated:
      name: ScheduleUpdated
      title: Schedule Updated
      summary: A schedule has been updated
      payload:
        $ref: '#/components/schemas/ScheduleEventData'

    ScheduleSlotCreated:
      name: ScheduleSlotCreated
      title: Slot Created
      summary: A new schedule slot has been created
      payload:
        $ref: '#/components/schemas/ScheduleSlotEventData'

    ScheduleSlotUpdated:
      name: ScheduleSlotUpdated
      messageId: scheduleSlotUpdatedEvent
      title: Slot Updated
      summary: A schedule slot has been modified
      payload:
        $ref: '#/components/schemas/ScheduleSlotEventData'

    ScheduleSlotDeleted:
      name: ScheduleSlotDeleted
      title: Slot Deleted
      summary: A schedule slot has been deleted
      payload:
        $ref: '#/components/schemas/ScheduleSlotEventData'

    ScheduleSlotCapacityFull:
      name: ScheduleSlotCapacityFull
      title: Maximum Capacity Reached
      summary: A slot has reached its maximum capacity
      payload:
        $ref: '#/components/schemas/ScheduleSlotCapacityEventData'

    ScheduleSlotCapacityWarning:
      name: ScheduleSlotCapacityWarning
      title: Capacity Alert
      summary: A slot is approaching its maximum capacity
      payload:
        $ref: '#/components/schemas/ScheduleSlotCapacityEventData'

    ScheduleSubscribe:
      name: ScheduleSubscribe
      title: Subscribe to Schedule
      summary: Client subscribes to schedule events
      payload:
        $ref: '#/components/schemas/ScheduleSubscribeData'

    ScheduleUnsubscribe:
      name: ScheduleUnsubscribe
      title: Unsubscribe from Schedule
      summary: Client unsubscribes from schedule events
      payload:
        $ref: '#/components/schemas/ScheduleSubscribeData'

    ScheduleSlotJoin:
      name: ScheduleSlotJoin
      title: Join Slot
      summary: Client joins a schedule slot
      payload:
        $ref: '#/components/schemas/ScheduleSlotJoinData'

    ScheduleSlotLeave:
      name: ScheduleSlotLeave
      title: Leave Slot
      summary: Client leaves a schedule slot
      payload:
        $ref: '#/components/schemas/ScheduleSlotJoinData'

    # Child Messages
    ChildAdded:
      name: ChildAdded
      title: Child Added
      summary: A child has been added to a family
      payload:
        $ref: '#/components/schemas/ChildEventData'

    ChildUpdated:
      name: ChildUpdated
      title: Child Updated
      summary: Child information has been modified
      payload:
        $ref: '#/components/schemas/ChildEventData'

    ChildDeleted:
      name: ChildDeleted
      title: Child Deleted
      summary: A child has been deleted from a family
      payload:
        $ref: '#/components/schemas/ChildEventData'

    # Vehicle Messages
    VehicleAdded:
      name: VehicleAdded
      title: Vehicle Added
      summary: A vehicle has been added to a family
      payload:
        $ref: '#/components/schemas/VehicleEventData'

    VehicleUpdated:
      name: VehicleUpdated
      title: Vehicle Updated
      summary: Vehicle information has been modified
      payload:
        $ref: '#/components/schemas/VehicleEventData'

    VehicleDeleted:
      name: VehicleDeleted
      title: Vehicle Deleted
      summary: A vehicle has been deleted from a family
      payload:
        $ref: '#/components/schemas/VehicleEventData'

    # Family Messages
    FamilyMemberJoined:
      name: FamilyMemberJoined
      title: Member Joined Family
      summary: A member has joined a family
      payload:
        $ref: '#/components/schemas/FamilyMemberEventData'

    FamilyMemberLeft:
      name: FamilyMemberLeft
      title: Member Left Family
      summary: A member has left a family
      payload:
        $ref: '#/components/schemas/FamilyMemberEventData'

    FamilyUpdated:
      name: FamilyUpdated
      title: Family Updated
      summary: Family information has been modified
      payload:
        $ref: '#/components/schemas/FamilyEventData'

    # User Presence Messages
    UserJoined:
      name: UserJoined
      title: User Connected
      summary: A user has connected and joined a group
      payload:
        $ref: '#/components/schemas/UserEventData'

    UserLeft:
      name: UserLeft
      title: User Disconnected
      summary: A user has disconnected or left a group
      payload:
        $ref: '#/components/schemas/UserEventData'

    UserTyping:
      name: UserTyping
      title: User Typing
      summary: A user starts typing
      payload:
        $ref: '#/components/schemas/TypingEventData'

    UserStoppedTyping:
      name: UserStoppedTyping
      title: User Stopped Typing
      summary: A user stops typing
      payload:
        $ref: '#/components/schemas/TypingEventData'

    # System Messages
    Notification:
      name: Notification
      title: Notification
      summary: System notification
      payload:
        $ref: '#/components/schemas/NotificationEventData'

    ConflictDetected:
      name: ConflictDetected
      title: Conflict Detected
      summary: A conflict has been detected
      payload:
        $ref: '#/components/schemas/ConflictEventData'

    Error:
      name: Error
      messageId: errorEvent
      title: Error
      summary: Server or validation error
      payload:
        $ref: '#/components/schemas/ErrorEventData'

    Heartbeat:
      name: Heartbeat
      title: Ping
      summary: Client sends a keep-alive ping
      payload:
        type: object
        properties:
          timestamp:
            type: integer
            description: UNIX timestamp of ping

    HeartbeatAck:
      name: HeartbeatAck
      title: Pong
      summary: Server responds to client ping
      payload:
        $ref: '#/components/schemas/HeartbeatAckData'

  schemas:
    # Common Schemas
    ConnectedPayload:
      type: object
      description: Payload sent on successful connection
      required:
        - userId
        - timestamp
      properties:
        userId:
          type: string
          description: ID of connected user
        groups:
          type: array
          items:
            type: string
          description: List of user's group IDs
        timestamp:
          type: integer
          description: UNIX timestamp of connection

    # Group Schemas
    GroupEventData:
      type: object
      required:
        - groupId
        - action
      properties:
        groupId:
          type: string
          description: Group ID
        action:
          type: string
          enum: [created, deleted, updated]
          description: Action performed on group
        createdBy:
          type: string
          description: ID of user who created the group (for created)
        deletedBy:
          type: string
          description: ID of user who deleted the group (for deleted)
        updatedBy:
          type: string
          description: ID of user who updated the group (for updated)
        group:
          type: object
          description: Full group data (optional)
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type: string
            inviteCode:
              type: string

    GroupFamilyEventData:
      type: object
      required:
        - groupId
        - familyId
        - action
      properties:
        groupId:
          type: string
          description: Group ID
        familyId:
          type: string
          description: Family ID
        action:
          type: string
          enum: [added, left, removed]
          description: Action performed on family
        familyName:
          type: string
          description: Family name (optional)
        joinedBy:
          type: string
          description: ID of user who added the family
        removedBy:
          type: string
          description: ID of user who removed the family

    GroupFamilyRoleEventData:
      type: object
      required:
        - groupId
        - familyId
        - newRole
      properties:
        groupId:
          type: string
          description: Group ID
        familyId:
          type: string
          description: Family ID
        newRole:
          type: string
          enum: [admin, member]
          description: New family role
        previousRole:
          type: string
          enum: [admin, member]
          description: Previous family role
        updatedBy:
          type: string
          description: ID of user who changed the role

    GroupInvitationEventData:
      type: object
      required:
        - groupId
        - familyId
      properties:
        groupId:
          type: string
          description: Group ID
        familyId:
          type: string
          description: Invited family ID
        inviteCode:
          type: string
          description: Invitation code
        invitedBy:
          type: string
          description: ID of user who sent the invitation
        expiresAt:
          type: integer
          description: Invitation expiration timestamp

    MemberEventData:
      type: object
      required:
        - groupId
        - userId
        - action
      properties:
        groupId:
          type: string
          description: Group ID
        userId:
          type: string
          description: Member ID
        action:
          type: string
          enum: [joined, left]
          description: Action performed by member
        userName:
          type: string
          description: User name (optional)

    GroupJoinData:
      type: object
      required:
        - groupId
      properties:
        groupId:
          type: string
          description: Group ID to join/leave

    # Schedule Schemas
    ScheduleEventData:
      type: object
      required:
        - groupId
        - week
      properties:
        groupId:
          type: string
          description: Group ID
        week:
          type: string
          pattern: '^\d{4}-\d{1,2}$'
          description: Week in format YYYY-W or YYYY-WW
        schedule:
          type: object
          description: Schedule data (optional)

    ScheduleSlotEventData:
      type: object
      required:
        - groupId
        - scheduleSlotId
        - action
      properties:
        groupId:
          type: string
          description: Group ID
        scheduleSlotId:
          type: string
          description: Schedule slot ID
        action:
          type: string
          enum: [created, updated, deleted]
          description: Action performed on slot
        slot:
          type: object
          description: Slot data (optional)
          properties:
            id:
              type: string
            date:
              type: string
              format: date
            startTime:
              type: string
              format: time
            endTime:
              type: string
              format: time
            capacity:
              type: integer
            currentLoad:
              type: integer

    ScheduleSlotCapacityEventData:
      type: object
      required:
        - groupId
        - scheduleSlotId
        - status
      properties:
        groupId:
          type: string
          description: Group ID
        scheduleSlotId:
          type: string
          description: Schedule slot ID
        status:
          type: string
          enum: [full, warning]
          description: Capacity status
        currentLoad:
          type: integer
          description: Current slot load
        capacity:
          type: integer
          description: Maximum slot capacity
        message:
          type: string
          description: Descriptive message (optional)

    ScheduleSubscribeData:
      type: object
      required:
        - groupId
        - week
      properties:
        groupId:
          type: string
          description: Group ID
        week:
          type: string
          pattern: '^\d{4}-\d{1,2}$'
          description: Week in format YYYY-W or YYYY-WW

    ScheduleSlotJoinData:
      type: object
      required:
        - scheduleSlotId
      properties:
        scheduleSlotId:
          type: string
          description: Schedule slot ID

    # Child Schemas
    ChildEventData:
      type: object
      required:
        - familyId
        - childId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        childId:
          type: string
          description: Child ID
        action:
          type: string
          enum: [added, updated, deleted]
          description: Action performed on child
        child:
          type: object
          description: Child data (optional)
          properties:
            id:
              type: string
            firstName:
              type: string
            lastName:
              type: string
            dateOfBirth:
              type: string
              format: date

    # Vehicle Schemas
    VehicleEventData:
      type: object
      required:
        - familyId
        - vehicleId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        vehicleId:
          type: string
          description: Vehicle ID
        action:
          type: string
          enum: [added, updated, deleted]
          description: Action performed on vehicle
        vehicle:
          type: object
          description: Vehicle data (optional)
          properties:
            id:
              type: string
            make:
              type: string
            model:
              type: string
            year:
              type: integer
            capacity:
              type: integer

    # Family Schemas
    FamilyMemberEventData:
      type: object
      required:
        - familyId
        - userId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        userId:
          type: string
          description: Member ID
        action:
          type: string
          enum: [joined, left]
          description: Action performed by member
        userName:
          type: string
          description: User name (optional)
        role:
          type: string
          description: Role in family (optional)

    FamilyEventData:
      type: object
      required:
        - familyId
        - action
      properties:
        familyId:
          type: string
          description: Family ID
        action:
          type: string
          enum: [updated]
          description: Action performed on family
        family:
          type: object
          description: Family data (optional)
          properties:
            id:
              type: string
            name:
              type: string

    # User Presence Schemas
    UserEventData:
      type: object
      required:
        - userId
        - groupId
        - action
      properties:
        userId:
          type: string
          description: User ID
        groupId:
          type: string
          description: Group ID
        action:
          type: string
          enum: [joined, left]
          description: Action performed by user
        userName:
          type: string
          description: User name (optional)

    TypingEventData:
      type: object
      required:
        - userId
        - scheduleSlotId
        - action
      properties:
        userId:
          type: string
          description: User ID
        scheduleSlotId:
          type: string
          description: Schedule slot ID
        action:
          type: string
          enum: [typing, stopped_typing]
          description: Typing action

    # System Schemas
    NotificationEventData:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          enum: [SCHEDULE_PUBLISHED, MEMBER_JOINED, MEMBER_LEFT, INFO, WARNING, SUCCESS]
          description: Notification type
        message:
          type: string
          description: Notification message
        data:
          type: object
          description: Additional data (optional)

    ConflictEventData:
      type: object
      required:
        - scheduleSlotId
        - conflictType
        - affectedUsers
      properties:
        scheduleSlotId:
          type: string
          description: Conflicting schedule slot ID
        conflictType:
          type: string
          enum: [DRIVER_DOUBLE_BOOKING, VEHICLE_DOUBLE_BOOKING, CAPACITY_EXCEEDED]
          description: Conflict type
        affectedUsers:
          type: array
          items:
            type: string
          description: List of affected user IDs
        message:
          type: string
          description: Descriptive conflict message

    ErrorEventData:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          description: Error type
        message:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details

    HeartbeatAckData:
      type: object
      required:
        - timestamp
      properties:
        timestamp:
          type: integer
          description: UNIX timestamp of response
